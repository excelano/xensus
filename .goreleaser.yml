# goreleaser configuration. Triggered by .github/workflows/release.yml on
# every "v*" tag push. To test locally (optional):
#   goreleaser release --snapshot --clean
# Snapshots produce binaries in ./dist/ without touching GitHub.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: xensus
    main: .
    binary: xensus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: xensus
    name_template: "xensus_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
      - SECURITY.md

nfpms:
  - id: xensus
    package_name: xensus
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: David M. Anderson <david.anderson@excelano.com>
    description: |
      Identity registry for Microsoft 365 tenants.
      Self-hosted HTTP server that hands out canonical, never-reused
      person IDs (X-000123 format) and records associations to source
      systems (HR, AD, FieldGlass, etc.) without trying to be the master
      of any one of them. Pure Go, M365 OIDC sign-in, SQLite-backed.
      See /usr/share/doc/xensus/README.md for setup.
    homepage: https://github.com/excelano/xensus
    license: MIT
    formats:
      - deb
    section: admin
    priority: optional
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/xensus/copyright
      - src: ./README.md
        dst: /usr/share/doc/xensus/README.md
      - src: ./SECURITY.md
        dst: /usr/share/doc/xensus/SECURITY.md

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
  # Ship install.sh alongside the platform tarballs so users can pin to a
  # specific release URL instead of relying on the rolling main branch.
  extra_files:
    - glob: install.sh
    - glob: uninstall.sh

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
